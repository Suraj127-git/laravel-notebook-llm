name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-test:
    name: Backend (Docker)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Copy Docker env file
        run: cp backend/.env.docker backend/.env.docker.ci
          && echo "GROQ_API_KEY=test-key" >> backend/.env.docker.ci
          && echo "VOYAGEAI_API_KEY=test-key" >> backend/.env.docker.ci
          && echo "DB_CONNECTION=pgsql" >> backend/.env.docker.ci

      - name: Build backend image
        run: docker compose build backend

      - name: Start infrastructure
        run: docker compose up -d postgres redis

      - name: Wait for Postgres
        run: |
          docker compose exec -T postgres sh -c '
            until pg_isready -U postgres -d notebookllm; do sleep 1; done
          '

      - name: Run tests in container
        run: |
          docker compose run --rm \
            -e APP_ENV=testing \
            -e DB_CONNECTION=pgsql \
            -e DB_HOST=postgres \
            -e DB_PORT=5432 \
            -e DB_DATABASE=notebookllm \
            -e DB_USERNAME=postgres \
            -e DB_PASSWORD=secret \
            -e CACHE_STORE=array \
            -e SESSION_DRIVER=array \
            -e QUEUE_CONNECTION=sync \
            -e GROQ_API_KEY=test-key \
            -e VOYAGEAI_API_KEY=test-key \
            backend php artisan test --parallel

      - name: Laravel Pint lint check
        run: |
          docker compose run --rm backend vendor/bin/pint --test

      - name: PHPStan analysis
        run: |
          docker compose run --rm backend vendor/bin/phpstan analyse --no-progress

      - name: Teardown
        if: always()
        run: docker compose down -v

  frontend-test:
    name: Frontend (Docker)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build frontend dev image
        run: docker build --target dev -t notebookllm-frontend-ci ./frontend

      - name: Lint
        run: docker run --rm notebookllm-frontend-ci npm run lint

      - name: Type check
        run: docker run --rm notebookllm-frontend-ci npx tsc --noEmit

      - name: Production build
        run: docker build --target build -t notebookllm-frontend-build ./frontend

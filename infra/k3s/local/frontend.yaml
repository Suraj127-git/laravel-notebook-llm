apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: notebookllm-local
data:
  VITE_API_BASE_URL: "/api"
  VITE_REVERB_APP_KEY: "lgdbldvgvcqqosaobmym"
  VITE_REVERB_HOST: "localhost"
  VITE_REVERB_PORT: "8080"
  VITE_REVERB_SCHEME: "http"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: notebookllm-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: notebookllm/frontend:latest
        ports:
        - containerPort: 5173
        envFrom:
        - configMapRef:
            name: frontend-config
        livenessProbe:
          httpGet:
            path: /
            port: 5173
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 5173
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: notebookllm-local
spec:
  selector:
    app: frontend
  ports:
  - port: 5173
    targetPort: 5173
  type: ClusterIP

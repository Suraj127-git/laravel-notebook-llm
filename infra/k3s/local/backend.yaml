apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: notebookllm-local
data:
  APP_ENV: local
  APP_DEBUG: "true"
  DB_HOST: postgres
  DB_DATABASE: notebookllm
  DB_USERNAME: postgres
  DB_PASSWORD: secret
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  CACHE_DRIVER: redis
  QUEUE_CONNECTION: redis
  SESSION_DRIVER: redis
  LOG_CHANNEL: stderr
  LOG_LEVEL: debug
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: notebookllm-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: notebookllm/backend:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: backend-config
        livenessProbe:
          httpGet:
            path: /up
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /up
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - name: backend-storage
          mountPath: /var/www/html/storage
      volumes:
      - name: backend-storage
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: notebookllm-local
spec:
  selector:
    app: backend
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reverb
  namespace: notebookllm-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reverb
  template:
    metadata:
      labels:
        app: reverb
    spec:
      containers:
      - name: reverb
        image: notebookllm/backend:latest
        command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080", "--no-interaction"]
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: backend-config
---
apiVersion: v1
kind: Service
metadata:
  name: reverb
  namespace: notebookllm-local
spec:
  selector:
    app: reverb
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: queue
  namespace: notebookllm-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: queue
  template:
    metadata:
      labels:
        app: queue
    spec:
      containers:
      - name: queue
        image: notebookllm/backend:latest
        command: ["php", "artisan", "queue:work", "redis", "--tries=3", "--timeout=300", "--sleep=3", "--max-jobs=500", "--max-time=3600"]
        envFrom:
        - configMapRef:
            name: backend-config
        volumeMounts:
        - name: backend-storage
          mountPath: /var/www/html/storage
      volumes:
      - name: backend-storage
        emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler
  namespace: notebookllm-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scheduler
  template:
    metadata:
      labels:
        app: scheduler
    spec:
      containers:
      - name: scheduler
        image: notebookllm/backend:latest
        command: ["php", "artisan", "schedule:work"]
        envFrom:
        - configMapRef:
            name: backend-config
        volumeMounts:
        - name: backend-storage
          mountPath: /var/www/html/storage
      volumes:
      - name: backend-storage
        emptyDir: {}

apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: notebookllm-prod
type: Opaque
data:
  POSTGRES_DB: bm90ZWJvb2tsbW0=  # notebookllm
  POSTGRES_USER: cG9zdGdyZXM=    # postgres
  POSTGRES_PASSWORD: <BASE64_ENCODED_PASSWORD>  # Replace with actual base64 encoded password
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: notebookllm-prod
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: pgvector/pgvector:0.7.4-pg16
        ports:
        - containerPort: 5432
        envFrom:
        - secretRef:
            name: postgres-secret
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
            - -d
            - notebookllm
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 10
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
            - -d
            - notebookllm
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 5
  volumeClaimTemplates:
  - metadata:
      name: postgres-storage
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: fast-ssd  # Adjust based on your storage class
      resources:
        requests:
          storage: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: notebookllm-prod
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
  type: ClusterIP

services:

  # ── PostgreSQL (with pgvector) ─────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:0.7.4-pg16
    container_name: notebookllm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: notebookllm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notebookllm"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis (sessions / cache / queues) ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: notebookllm-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Laravel HTTP server ────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: notebookllm-backend
    restart: unless-stopped
    working_dir: /var/www/html
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
      - backend_storage:/var/www/html/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/up"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Laravel Reverb (WebSocket server) ─────────────────────────────────────
  reverb:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: notebookllm-reverb
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan reverb:start --host=0.0.0.0 --port=8080 --no-interaction
    env_file:
      - ./backend/.env.docker
    ports:
      - "8080:8080"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
      - backend_storage:/var/www/html/storage

  # ── Queue worker ───────────────────────────────────────────────────────────
  queue:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: notebookllm-queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work redis --tries=3 --timeout=300 --sleep=3 --max-jobs=500 --max-time=3600
    env_file:
      - ./backend/.env.docker
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
      - backend_storage:/var/www/html/storage

  # ── Laravel scheduler ──────────────────────────────────────────────────────
  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: notebookllm-scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan schedule:work
    env_file:
      - ./backend/.env.docker
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
      - backend_storage:/var/www/html/storage

  # ── Nightwatch agent (log ingest → Nightwatch cloud) ──────────────────────
  nightwatch-agent:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: notebookllm-nightwatch
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan nightwatch:agent --listen-on=0.0.0.0:2407
    env_file:
      - ./backend/.env.docker
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
      - backend_storage:/var/www/html/storage

  # ── Frontend (Vite dev server) ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: notebookllm-frontend
    restart: unless-stopped
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: /api
      VITE_REVERB_APP_KEY: lgdbldvgvcqqosaobmym
      VITE_REVERB_HOST: localhost
      VITE_REVERB_PORT: "8080"
      VITE_REVERB_SCHEME: http
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  postgres-data:
  backend_vendor:
  backend_storage:
  frontend_node_modules:
